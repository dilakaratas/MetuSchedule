name: Auto Update METU Data

on:
  schedule:
    - cron: '0 1 28-31 * *'  # Ayın son günü 01:00 UTC / Türkiye 04:00
  workflow_dispatch:         # Manuel tetikleme

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Ayın son günü mü kontrol et
        id: last_day_check
        run: |
          TOMORROW=$(date -u -d tomorrow +%d)
          if [ "$TOMORROW" = "01" ]; then
            echo "is_last_day=true" >> $GITHUB_OUTPUT
          else
            echo "is_last_day=false" >> $GITHUB_OUTPUT
          fi

      - name: Repo'yu indir
        if: steps.last_day_check.outputs.is_last_day == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4

      - name: Python kur
        if: steps.last_day_check.outputs.is_last_day == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Bağımlılıkları yükle
        if: steps.last_day_check.outputs.is_last_day == 'true' || github.event_name == 'workflow_dispatch'
        run: pip install requests beautifulsoup4 lxml

      - name: Scraper'ı çalıştır
        if: steps.last_day_check.outputs.is_last_day == 'true' || github.event_name == 'workflow_dispatch'
        run: python scraper/metu_catalog_scrape.py

      - name: Değişiklik var mı kontrol et
        if: steps.last_day_check.outputs.is_last_day == 'true' || github.event_name == 'workflow_dispatch'
        id: check
        run: |
          git diff --quiet public/metu_courses_clean.json && echo "changes=false" >> $GITHUB_OUTPUT || echo "changes=true" >> $GITHUB_OUTPUT

      - name: Commit ve push
        if: (steps.last_day_check.outputs.is_last_day == 'true' || github.event_name == 'workflow_dispatch') && steps.check.outputs.changes == 'true'
        run: |
          git config user.email "bot@github.com"
          git config user.name "GitHub Bot"
          git add public/metu_courses_clean.json
          git commit -m "chore: ODTÜ ders verisi güncellendi"
          git push

      - name: Değişiklik yok
        if: (steps.last_day_check.outputs.is_last_day == 'true' || github.event_name == 'workflow_dispatch') && steps.check.outputs.changes == 'false'
        run: echo "Veri değişmemiş, commit atılmadı."

      - name: Ayın son günü değil
        if: steps.last_day_check.outputs.is_last_day == 'false' && github.event_name != 'workflow_dispatch'
        run: echo "Bugün ayın son günü değil, işlem yapılmadı."
